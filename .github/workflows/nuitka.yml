name: 'nuitka CLI'

on:
  workflow_dispatch:
    inputs:
      custom_ref:
        description: 'custom ref|branch|tag'
        required: true

env:
  PYTHONWARNDEFAULTENCODING: true
  APPNAME: imggal
  DIST_DIR: dist_imggal
  HOMEBREW_NO_INSTALL_CLEANUP: true
  HOMEBREW_NO_ENV_HINTS: true
  HOMEBREW_CLEANUP_MAX_AGE_DAYS: 999
  HOMEBREW_NO_ANALYTICS: true
  HOMEBREW_NO_AUTO_UPDATE: true
  MAIN_SCRIPT: imggal.py
  RESOURCE_DIR: "resources" 

jobs:
  build_macos:
    runs-on: ${{ matrix.os }}

    strategy:
      # create-dmg chokes when running parallel workers 
      # max-parallel: 1 
      # see https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/running-variations-of-jobs-in-a-workflow
      matrix:
        # python-version: ['3.8', '3.9', '3.10', '3.11', '3.12', '3.13']
        python-version: ['3.13']
        os: ['macos-13', 'macos-14']
        # os: ['macos-12', 'macos-13', 'macos-14']
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
        with:
          # submodules: true
          # Number of commits to fetch, ootb only 1 commit
          # 0 = all history for all branches and tags. (needed for git describe)
          fetch-depth: 0
          fetch-tags: true
          ref: master
          
      # - name: Update brew
      #   run: |
      #     brew update
          
      # - name: Install brew dependencies
      #   run: |
      #     brew rm icu4c --force \
      #     brew install \
      #        libffi \
      #        pkg-config \
      #        lzo \
      #        create-dmg \
      #        icu4c@75
      #        # icu4c \
      #        # already installed?             python-tk@${{ matrix.python-version }} \
      
      # - name: Set up Python ${{ matrix.python-version }}
      #   uses: actions/setup-python@v5
      #   with:
      #     python-version: ${{ matrix.python-version }}

      # - name: Set cache dir
      #   run: echo "pip_cache_dir=$(pip cache dir)" >> $GITHUB_ENV
      #   shell: bash

      # - name: Fetch cache
      #   id: cache-target
      #   uses: actions/cache@v4
      #   with:
      #     path: ${{ env.pip_cache_dir }}
      #     key: ${{ runner.os }}-${{ matrix.python-version }}

      # - name: Install uv
      #   # https://docs.astral.sh/uv/guides/integration/github/#caching
      #   uses: astral-sh/setup-uv@v5

      # - name: install nuitka
      #   run: |
      #     python3 -m pip install --break-system-packages nuitka
      #     which -a nuitka
      #     nuitka --version
      
      - name: set vars
        id: envconf
        run: |
          echo "VERSION=$(git describe --abbrev=0 --tags)" >> $GITHUB_ENV
          echo "VERSION=$VERSION"
          echo "TAG=$(git describe --tags)" >> $GITHUB_ENV
          echo "TAG=$TAG"
          
      - name: nuitka build
        run: |
          python3 -m venv .venv
          source .venv/bin/activate
          python3 -m pip install nuitka Pillow pillow-heif
          which -a nuitka
          nuitka \
          	--standalone \
          	--assume-yes-for-downloads \
          	--follow-imports \
          	--macos-create-app-bundle \
          	--macos-signed-app-name="$APPNAME" \
          	--macos-app-name="$APPNAME" \
            --macos-app-icon=icon.icns \
          	--nofollow-import-to=gi \
          	--nofollow-import-to=gtk \
          	--nofollow-import-to=pyqt4 \
          	--nofollow-import-to=pyqt5 \
          	--nofollow-import-to=pyqt6 \
          	--nofollow-import-to=*.tests \
          	--noinclude-pytest-mode=nofollow \
          	--noinclude-setuptools-mode=nofollow \
          	--plugin-disable=pyqt5 \
          	--noinclude-custom-mode=unittest:nofollow \
          	--output-dir="$DIST_DIR" \
          	--output-filename=$APPNAME \
          	$MAIN_SCRIPT

      - name: Upload Artifacts zip
        uses: actions/upload-artifact@v4
        with:
          # https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/accessing-contextual-information-about-workflow-runs#github-context
          overwrite: true
          name: ${{ github.event.repository.name }}-${{ matrix.os }}-${{ matrix.version }}-${{ matrix.arch }}-${{ github.sha }}-${{runner.name}}
          path: |
            ${{ env.DIST_DIR }}/${{ env.APPNAME }}.app

      - name: Create DMG
      # https://github.com/tauri-apps/tauri/blob/dev/crates/tauri-bundler/src/bundle/macos/dmg/bundle_dmg
        if: true
        run: |
          bash ./bundle_dmg --skip-jenkins --volname "${{ env.APPNAME }}-${{env.VERSION}}" --volicon icon.icns --app-drop-link 50 50 "${{env.APPNAME}}-${{ matrix.os }}-${{ env.TAG }}.dmg" "${{ env.DIST_DIR }}/${{ env.APPNAME }}.app"

      - name: Upload Artifacts DMG
        if: true
        uses: actions/upload-artifact@v4
        with:
          overwrite: true
          # https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/accessing-contextual-information-about-workflow-runs#github-context
          name: ${{ github.event.repository.name }}-${{ matrix.os }}-${{ github.sha }}
          path: |
            **/*.dmg
            
  build_windows_x64:
    strategy:
      matrix:
        python-version:
          - "3.13"
        os: [windows-2022]
        
    runs-on: ${{ matrix.os }}

    steps:
      - name: Check-out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: master
          
      - name: nuitka build
        shell: cmd
        run: |
          python3 -m venv .venv
          .venv\Scripts\activate.bat
          python3 -m pip install nuitka Pillow pillow-heif
          python3 -m nuitka --standalone --assume-yes-for-downloads --follow-imports --nofollow-import-to=tkinter --nofollow-import-to=gi --nofollow-import-to=gtk --output-dir=dist_imggal imggal.py
          dir /s
          
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.repository.name }}-${{ runner.os }}-${{ runner.arch }}-${{ github.sha }}
          path: |
            dist_imggal
            
  release:
    needs: [build_macos, build_windows_x64]
    runs-on: ubuntu-latest
    permissions:
      contents: write    

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        
        with:
          path: ./artifacts
          merge-multiple: true
          
      - name: List artifacts
        run: |
          pwd
          echo ${{ github.workspace }}/artifacts
          ls -alh ${{ github.workspace }}
          find .       

      - name: make release
        uses: ncipollo/release-action@v1
        with:
          name: ${{ github.event.repository.name }}-v${{ github.event.inputs.custom_ref }}
          # append to include branch name: -${{ github.ref_name }}
          # body: macos-${{ matrix.architecture }}
          artifacts: "artifacts/*.zip,artifacts/*.dmg"
          artifactContentType: application/zip
          generateReleaseNotes: false
          makeLatest: true
          allowUpdates: true
          tag: ${{ github.event.inputs.custom_ref }}
          
